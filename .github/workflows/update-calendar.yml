name: Update Latvia Hockey Calendar

on:
  schedule:
    # Run daily at 3 AM UTC (since games don't change often)
    # For yearly tournaments, adjust as needed: 0 3 * * * (daily), 0 0 * * 0 (weekly), 0 0 1 * * (monthly)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate calendar
        run: npm run build

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/latvia-hockey-cal.ical output/latvia-hockey-cal.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update latvia hockey calendar" && git push)
